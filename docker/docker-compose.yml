version: "3.9"

services:
  lora-studio:
    build: ..
    ports:
      - "7860:7860"
    volumes:
      - ../data:/app/data
      - ../outputs:/app/outputs
      - ../models:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
